[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: Integration tests requiring external services.
    unit: Unit tests.
    slow: Slow-running tests.
    smoke: Smoke tests.

addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings

asyncio_mode = auto
norecursedirs = .git .venv venv airflow_home .dvc .terraform
